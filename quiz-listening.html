<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Weekly Routine Quiz - Global Step</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #001f3f; --accent: #00D4FF; --card-bg: #ffffff; --text-main: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lato', sans-serif; background-color: var(--primary); color: var(--text-main); padding: 40px 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .quiz-card { width: 100%; max-width: 850px; background: var(--card-bg); border-radius: 16px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); border: 1px solid #e2e8f0; }
        .header-quiz { text-align: center; margin-bottom: 30px; }
        .header-quiz h2 { font-family: 'Poppins', sans-serif; color: var(--primary); font-size: 28px; }
        .schedule-badge { display: inline-block; background: #e0faff; color: #0369a1; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 14px; margin-bottom: 15px; }
        .audio-container { background: #f1f5f9; padding: 20px; border-radius: 12px; margin-bottom: 30px; border-left: 5px solid var(--accent); text-align: center; }
        audio { width: 100%; }
        .question-box { margin-bottom: 30px; background: #fff; padding: 25px; border: 1px solid #e2e8f0; border-radius: 12px; }
        .question-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 15px; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-item { display: flex; align-items: center; padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; background: #fff; transition: 0.2s; }
        .option-item:hover { border-color: var(--accent); background: #f0fdff; }
        .option-item input[type="radio"] { display: none; }
        .option-item.selected { background: #e0faff; border-color: var(--accent); color: var(--primary); }
        .btn-submit { width: 100%; background: var(--primary); color: white; border: 2px solid var(--accent); padding: 16px; border-radius: 50px; font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; }
        .btn-submit:hover { background: var(--accent); color: var(--primary); }
        #result-area { margin-top: 30px; padding: 30px; border-radius: 12px; display: none; }
        .success-score { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .review-box { background: rgba(255,255,255,0.7); padding: 20px; border-radius: 8px; margin-top: 20px; color: #1e293b; }
        .back-home { display: inline-block; margin-top: 30px; text-decoration: none; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="header-quiz">
        <div class="schedule-badge" id="schedule-info"><i class="fa-solid fa-calendar-week"></i> Menganalisis Hari Tes...</div>
        <h2>IELTS Listening: 10-Question Master Routine</h2>
        <p>Sistem mendeteksi hari secara real-time dan menyajikan 10 soal standar ujian Cambridge.</p>
    </div>

    <div class="audio-container">
        <p><i class="fa-solid fa-volume-high"></i> Sesi Rekaman Suara Pendukung Ujian:</p>
        <audio controls><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>
    </div>

    <form id="dynamicQuizForm" onsubmit="evaluateQuiz(event)">
        <div id="questions-container"></div>
        <button type="submit" class="btn-submit">SUBMIT & HITUNG BAND SCORE</button>
    </form>

    <div id="result-area" class="success-score">
        <h3 id="scoreTitle" style="font-size: 24px; margin-bottom: 5px;"></h3>
        <p id="bandEstimate" style="font-size: 18px; font-weight: 700;"></p>
        <div class="review-box" id="explanationBox"></div>
    </div>

    <center><a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard Utama</a></center>
</div>

<script>
    const weeklyDatabase = {
        // BLOK 1: SENIN, SELASA, RABU (10 Soal Standar Cambridge)
        awalMinggu: {
            name: "Jadwal Awal Minggu (Form Completion Focus)",
            questions: [
                { id: "m1", q: "[Part 1] Complete the form. Customer Last Name: Richard ...", options: ["Clark", "Clarke", "Clarkson"], ans: "B", note: "Clarke: Huruf 'e' terakhir dieja jelas." },
                { id: "m2", q: "[Part 1] Planned date of the move: ... September.", options: ["17th", "19th", "27th"], ans: "B", note: "19th: Angka 17 dianulir karena kendala internal." },
                { id: "m3", q: "[Part 1] Delivery Address: 42 ... Avenue.", options: ["Oak Ridge", "Oakridge", "Oakbridge"], ans: "B", note: "Oakridge: Nama jalan digabung menjadi satu kata." },
                { id: "m4", q: "[Part 1] Contact Number: 07912 ...", options: ["445891", "455891", "445819"], ans: "A", note: "445891: Deteksi akurat frasa 'double four'." },
                { id: "m5", q: "[Part 1] Quote Reference Code: ...", options: ["MB782V", "MV782B", "MV7828"], ans: "B", note: "MV782B: Jebakan konsonan fonetik huruf B dan V." },
                { id: "m6", q: "[Part 2] What was the main reason for updating the building?", options: ["Unsafe structure", "To fit more students", "Digital expansion"], ans: "B", note: "To fit more students: Akibat lonjakan pendaftaran mahasiswa." },
                { id: "m7", q: "[Part 2] What features the new ground floor layout?", options: ["A social café learning zone", "A silent research lab", "IT support desks"], ans: "A", note: "Social café: Area interaksi kasual mahasiswa." },
                { id: "m8", q: "[Part 2] Location of the new Multimedia Lab:", options: ["Behind reception desk", "Opposite emergency door", "Near the elevators"], ans: "A", note: "Behind reception desk: Jalur navigasi dari koridor utama." },
                { id: "m9", q: "[Part 2] Student opinion on the new booking interface:", options: ["Flawless design", "Efficient but complex layout", "Waste of time"], ans: "B", note: "Efficient but complex: Kecepatan diakui namun navigasi dikritik." },
                { id: "m10", q: "[Part 2] The upgraded facility opens officially in:", options: ["Spring semester", "Autumn ceremony", "Summer break"], ans: "A", note: "Spring semester: Jadwal pembukaan resmi setelah libur dingin." }
            ]
        },
        // BLOK 2: KAMIS, JUMAT, SABTU, MINGGU (10 Soal Alternatif Menguji Kritis)
        akhirMinggu: {
            name: "Jadwal Akhir Minggu (Academic Discussion Focus)",
            questions: [
                { id: "k1", q: "[Part 3] What is the primary focus of the students' joint research project?", options: ["Marine pollution", "Renewable energy usage", "Urban traffic solutions"], ans: "B", note: "Renewable energy: Mereka fokus mengevaluasi panel surya di daerah urban." },
                { id: "k2", q: "[Part 3] Which major problem did Dr. Green point out in their first draft?", options: ["Lack of data references", "Weak conclusion logic", "Inconsistent formatting"], ans: "A", note: "Lack of data: Grafik pendukung argumen bab 2 dinilai masih terlalu sedikit." },
                { id: "k3", q: "[Part 3] The students will conduct their field survey in which month?", options: ["April", "May", "June"], ans: "B", note: "May: Rencana April ditunda karena menunggu izin resmi fakultas." },
                { id: "k4", q: "[Part 3] What funding source did they secure for the project?", options: ["Government grant", "University internal budget", "Private company sponsor"], ans: "C", note: "Private company: Pendanaan penuh disetujui oleh firma teknologi lokal." },
                { id: "k5", q: "[Part 3] Professor Smith expects the final submission by:", options: ["Friday noon", "Monday midnight", "Next Thursday"], ans: "B", note: "Monday midnight: Ada perpanjangan waktu akhir pekan dari tenggat awal." },
                { id: "k6", q: "[Part 4] The lecture states that early human migration was triggered by:", options: ["Climate shifts", "Tribal warfare", "Search for metal tools"], ans: "A", note: "Climate shifts: Perubahan pola cuaca ekstrem memaksa perpindahan kelompok." },
                { id: "k7", q: "[Part 4] What evidence was found near the ancient river valley?", options: ["Clay pottery fragments", "Preserved wooden boats", "Iron weapon molds"], ans: "A", note: "Clay pottery: Fragmen tembikar mengonfirmasi adanya pemukiman permanen." },
                { id: "k8", q: "[Part 4] The speaker notes that agriculture began earlier than expected in:", options: ["Eastern Europe", "Western Asia", "Northern Africa"], ans: "B", note: "Western Asia: Penemuan biji gandum purba mematahkan teori lama." },
                { id: "k9", q: "[Part 4] Why did the ancient settlement collapse eventually?", options: ["Sudden volcanic eruption", "Soil degradation", "Foreign invasion"], ans: "B", note: "Soil degradation: Kegagalan panen berulang akibat hilangnya nutrisi tanah." },
                { id: "k10", q: "[Part 4] Modern researchers are currently utilizing what technology at the site?", options: ["Satellite imaging", "Deep-ground drilling", "AI carbon dating"], ans: "A", note: "Satellite imaging: Memetakan sisa pondasi kota dari luar angkasa tanpa merusak situs." }
            ]
        }
    };

    let activeQuestions = [];

    function checkSchedule() {
        const currentDay = new Date().getDay(); // 0 = Minggu, 1 = Senin, ... 6 = Sabtu
        let selectedBlock;

        // Jadwal Ganti: Senin(1), Selasa(2), Rabu(3) vs Kamis(4), Jumat(5), Sabtu(6), Minggu(0)
        if (currentDay >= 1 && currentDay <= 3) {
            selectedBlock = weeklyDatabase.awalMinggu;
        } else {
            selectedBlock = weeklyDatabase.akhirMinggu;
        }

        document.getElementById('schedule-info').innerHTML = `<i class="fa-solid fa-shuffle"></i> Sesi Aktif: ${selectedBlock.name}`;
        activeQuestions = selectedBlock.questions;
        renderQuestions();
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = "";
        activeQuestions.forEach((item, index) => {
            let optionsHTML = '';
            const labels = ['A', 'B', 'C'];
            item.options.forEach((opt, oIdx) => {
                optionsHTML += `
                    <label class="option-item" onclick="highlightOption(this, '${item.id}')">
                        <input type="radio" name="${item.id}" value="${labels[oIdx]}" required> 
                        ${labels[oIdx]}. ${opt}
                    </label>
                `;
            });
            container.innerHTML += `
                <div class="question-box">
                    <div class="question-title">${index + 1}. ${item.q.replace(/\n/g, '<br>')}</div>
                    <div class="options-list">${optionsHTML}</div>
                </div>
            `;
        });
    }

    function highlightOption(element, groupName) {
        const options = element.parentElement.querySelectorAll('.option-item');
        options.forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
    }

    function evaluateQuiz(event) {
        event.preventDefault();
        const form = document.getElementById('dynamicQuizForm');
        let correct = 0;
        let reviewHTML = '<strong>Analisis Bedah Distractor Ujian:</strong><br><br>';

        activeQuestions.forEach((item, index) => {
            const userAns = form.elements[item.id].value;
            if (userAns === item.ans) correct++;
            reviewHTML += `• <b>Soal ${index + 1}:</b> ${item.note}<br>`;
        });

        const resultArea = document.getElementById('result-area');
        document.getElementById('scoreTitle').innerText = `Skor Kamu: ${correct} Benar dari 10 Soal`;
        
        // Standar IELTS Listening Band Conversion untuk 10 Soal Akurasi
        let band = "";
        if (correct >= 9) band = "Band 8.5 - 9.0 (Elite Level)";
        else if (correct >= 7) band = "Band 7.0 - 8.0 (Target Kampus Dunia Terpenuhi!)";
        else if (correct >= 5) band = "Band 6.0 - 6.5 (Good Progress - Rapatkan barisan)";
        else band = "Band < 5.5 (Evaluasi fokus transkrip audio)";

        document.getElementById('bandEstimate').innerText = `Estimasi Performa: ${band}`;
        document.getElementById('explanationBox').innerHTML = reviewHTML;
        resultArea.style.display = 'block';
        resultArea.scrollIntoView({ behavior: 'smooth' });
    }

    window.onload = checkSchedule;
</script>
</body>
</html>
