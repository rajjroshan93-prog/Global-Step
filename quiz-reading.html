<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Academic Quiz - San Aethelgard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary: #001f3f; 
            --accent: #00D4FF; 
            --bg-dark: #00152b;
            --card-bg: #ffffff; 
            --text-main: #334155; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lato', sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding: 40px 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .quiz-card { width: 100%; max-width: 900px; background: var(--card-bg); border-radius: 20px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(0, 212, 255, 0.1); }
        .header-quiz { text-align: center; margin-bottom: 30px; }
        .header-quiz h2 { font-family: 'Poppins', sans-serif; color: var(--primary); font-size: 28px; }
        .schedule-badge { display: inline-block; background: #e0faff; color: #0369a1; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 13px; margin-bottom: 15px; text-transform: uppercase; }
        
        .passage-box { background: #f8fafc; padding: 30px; border-radius: 12px; border-left: 6px solid var(--primary); margin-bottom: 35px; font-size: 16px; line-height: 1.8; text-align: justify; max-height: 400px; overflow-y: auto; box-shadow: inset 0 2px 8px rgba(0,0,0,0.05); }
        .passage-box h3 { font-family: 'Poppins', sans-serif; margin-bottom: 15px; color: var(--primary); font-size: 20px; }
        
        .question-box { margin-bottom: 30px; background: #fff; padding: 25px; border: 1px solid #e2e8f0; border-radius: 12px; }
        .question-title { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 15px; line-height: 1.5; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-item { display: flex; align-items: center; padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; background: #fff; transition: 0.2s; }
        .option-item:hover { border-color: var(--accent); background: #f0fdff; }
        .option-item input[type="radio"] { display: none; }
        .option-item.selected { background: #e0faff; border-color: var(--accent); color: var(--primary); }
        
        .btn-submit { width: 100%; background: var(--primary); color: white; border: 2px solid var(--primary); padding: 16px; border-radius: 50px; font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: var(--accent); color: var(--primary); border-color: var(--accent); }
        
        #result-area { margin-top: 30px; padding: 30px; border-radius: 12px; display: none; }
        .success-score { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .review-box { background: rgba(255,255,255,0.8); padding: 20px; border-radius: 8px; margin-top: 20px; color: #1e293b; font-size: 15px; line-height: 1.6; }
        
        .back-home { display: inline-block; margin-top: 30px; text-decoration: none; color: #94a3b8; font-weight: 700; font-size: 14px; transition: 0.2s; text-transform: uppercase; }
        .back-home:hover { color: var(--accent); }

        .footer-credit { font-size: 11px; color: #64748b; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 700; text-align: center; margin-top: 25px; }
        .footer-credit a { color: var(--accent); text-decoration: none; margin-left: 4px; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="header-quiz">
        <div class="schedule-badge" id="schedule-info"><i class="fa-solid fa-sync fa-spin"></i> Mensinkronisasi Jadwal...</div>
        <h2>San Aethelgard: Academic Practice</h2>
        <p style="color: #64748b; font-size: 15px; margin-top: 5px;">Gunakan metode analisis kata kunci untuk membedakan fakta orisinal dari teks penguji.</p>
    </div>

    <div class="passage-box" id="passage-container"></div>

    <form id="dynamicQuizForm" onsubmit="evaluateQuiz(event)">
        <div id="questions-container"></div>
        <button type="submit" class="btn-submit">SUBMIT & ANALISIS BAND SCORE</button>
    </form>

    <div id="result-area" class="success-score">
        <h3 id="scoreTitle" style="font-size: 22px; margin-bottom: 5px; font-family: 'Poppins', sans-serif;"></h3>
        <p id="bandEstimate" style="font-size: 16px; font-weight: 700;"></p>
        <div class="review-box" id="explanationBox"></div>
    </div>

    <center><a href="dashboard.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard</a></center>
</div>

<div class="footer-credit">
    Created by San | <a href="https://www.instagram.com/sann_n228?igsh=MWo3M3g0NWcwZ2h0Yg==" target="_blank"><i class="fa-brands fa-instagram"></i> @sann_n228</a>
</div>

<script>
    const readingDatabase = {
        paketSeninSelasa: {
            name: "Academic Passage: The Evolution of Megacities (Jadwal: Senin - Selasa)",
            passage: `<h3>The Evolution of Megacities</h3><p>In the contemporary era, the phenomenon of the 'megacity'—defined as an urban agglomeration supporting a population in excess of ten million inhabitants—has fundamentally altered the global demographic landscape. At the inception of the twentieth century, only a handful of urban centers, notably London and New York, possessed the economic infrastructure to draw such vast concentrations of humanity. However, the latter half of the century witnessed an unprecedented shift, primarily driven by rapid industrialization and agrarian displacement in developing nations. Consequently, the epicenter of megacity growth transitioned dramatically from Western economies to Asia and Latin America.</p><p>Urban planners argue that while these colossal hubs function as engines of economic growth and technological innovation, they simultaneously pose severe logistical and environmental dilemmas. The sheer velocity of population influx frequently outpaces municipal infrastructure development, culminating in substandard housing, critical water scarcity, and highly congested transit systems. For instance, in several South Asian megacities, over forty percent of the populace resides in informal settlements lacking basic sanitation. Furthermore, the phenomenon of the 'urban heat island' effect—where built environments trap ambient heat—has exacerbated energy demands and raised local temperatures by up to five degrees Celsius.</p><p>Despite these acute challenges, some economists maintain a highly optimistic outlook. They assert that the dense concentration of human capital fosters a unique ecosystem of efficiency, where public services can theoretically be delivered at a lower per-capita cost than in sparsely populated rural regions. Moreover, proponents highlight that megacities are pioneering sustainable initiatives, such as vertical farming and zero-emission mass transit networks, out of absolute necessity. Ultimately, the future viability of these urban giants will depend not on arresting human migration, but on the sophistication of long-term administrative foresight and smart-city integration.</p>`,
            questions: [
                { id: "m1", q: "At the beginning of the twentieth century, New York and London were the only two cities in the world with over ten million residents.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "C", note: "NOT GIVEN: Teks hanya menyebutkan London dan New York sebagai contoh pusat kota yang menonjol (*notably*), tanpa membatasi bahwa tidak ada kota lain." },
                { id: "m2", q: "The primary driver of megacity growth in the latter half of the twentieth century was migration caused by changes in rural sectors and industrial growth.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "A", note: "TRUE: Sesuai dengan kalimat akhir paragraf pertama yang menyatakan dipicu oleh 'rapid industrialization and agrarian displacement' (perpindahan sektor pertanian/pedesaan)." },
                { id: "m3", q: "During the late twentieth century, megacity expansion accelerated faster in Western nations than in Asia.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "B", note: "FALSE: Teks dengan tegas menyatakan 'the epicenter of megacity growth transitioned dramatically from Western economies to Asia', pertumbuhan Asia jauh lebih cepat." },
                { id: "m4", q: "Municipalities generally manage to upgrade their infrastructure before the majority of new residents arrive.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "B", note: "FALSE: Kontradiktif dengan teks 'population influx frequently outpaces municipal infrastructure development'." }
            ]
        },
        paketRabuKamis: {
            name: "Academic Passage: The Paradigm Shift in Artificial Intelligence (Jadwal: Rabu - Kamis)",
            passage: `<h3>The Paradigm Shift in Artificial Intelligence</h3><p>The dawn of the twenty-first century has been characterized by an unprecedented acceleration in machine learning capabilities, shifting artificial intelligence (AI) from a speculative laboratory pursuit to an omnipresent societal foundation. Early computing pioneers predominantly relied on expert systems—rigid architectures governed by deterministic, human-authored rules. While these systems demonstrated proficiency in enclosed logical domains like chess, they proved utterly inadequate when confronted with the chaotic ambiguity of natural language or visual recognition. The contemporary renaissance of AI is fundamentally underpinned by deep neural networks, computational models designed to autonomously extract patterns from gargantuan datasets.</p><p>This systemic transition has ignited intense debates regarding economic disruption and the future of human labor. Sociologists caution that unlike previous industrial revolutions, which primarily automated manual tasks, generative AI models threaten to displace cognitive and creative occupations. Analysts note that algorithms can now synthesize legal briefs, generate programming scripts, and formulate medical diagnoses with a velocity that renders traditional white-collar frameworks obsolete. Paradoxically, this has augmented the economic valuation of tactile, non-routine manual professions, which remain remarkably difficult for robotic components to replicate cost-effectively.</p><p>Conversely, corporate leaders argue that AI does not foreshadow the eradication of employment, but rather an era of intellectual augmentation. By automating algorithmic, repetitive data processing, machines liberate human workers to concentrate on high-level strategic orchestration, ethics, and interpersonal communication. Proponents emphasize that in fields such as oncology, the symbiosis of human radiologists and deep learning algorithms yields diagnostic precision rates far superior to either entity working in isolation. The ultimate trajectory of this technology will likely be determined by institutional agility in implementing proactive retraining frameworks.</p>`,
            questions: [
                { id: "a1", q: "Early computing systems were highly successful at handling tasks that involved unpredictable natural language processing.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "B", note: "FALSE: Teks menyatakan sistem awal 'proved utterly inadequate' (sangat tidak memadai) menghadapi ambiguitas bahasa alami." },
                { id: "a2", q: "Deep neural networks require humans to manually write every rule for pattern extraction.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "B", note: "FALSE: Teks menjelaskan neural networks modern dirancang untuk 'autonomously extract patterns' (mengekstrak pola secara mandiri) dari dataset besar." },
                { id: "a3", q: "The current AI revolution is unique because it directly impacts cognitive and analytical jobs rather than just physical labor.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "A", note: "TRUE: Paragraf kedua mencatat bahwa tidak seperti revolusi industri terdahulu, AI sekarang mengancam pekerjaan kognitif dan kreatif (cognitive and creative occupations)." },
                { id: "a4", q: "Governments have already established mandatory financial subsidies for workers displaced by artificial intelligence.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "C", note: "NOT GIVEN: Teks hanya menyebutkan pentingnya pelatihan ulang (retraining frameworks), tidak membahas tentang subsidi keuangan dari pemerintah." }
            ]
        },
        paketJumatSabtuMinggu: {
            name: "Academic Passage: Architectural Engineering of Maya Civilization (Jadwal: Jumat - Minggu)",
            passage: `<h3>Architectural Engineering of Maya Civilization</h3><p>The monumental urban complexes engineered by the ancient Maya civilization across the Mesoamerican lowlands continue to challenge conventional historiography regarding pre-industrial societal capabilities. Operating without the benefit of draft animals, wheeled transportation, or metallurgy, Maya stone masons constructed sprawling civic-ceremonial centers dominated by towering limestone pyramids. Recent airborne LiDAR surveys have unveiled that these cities were not isolated enclaves, but interconnected components of a vast, highly sophisticated regional network. This infrastructure relied heavily on advanced hydrologic manipulation, a crucial adaptation given the region's severe seasonal droughts.</p><p>To sustain dense urban populations during the prolonged dry season, Maya engineers designed massive rainwater catchments and subterranean reservoirs called chultunes. These reservoirs were intricately lined with specialized plaster to impede water seepage, maintaining millions of liters of potable water. Furthermore, urban layouts were intentionally graded to funnel precipitation directly into these communal basins. In cities such as Tikal, the strategic placement of these reservoirs ensured that civic elites retained strict administrative control over water distribution, effectively cementing their political hegemony through structural resource management.</p><p>Beyond hydraulic prowess, the architectural orientation of Maya citadels demonstrated an astonishing comprehension of celestial mechanics. Prominent structures were aligned with mathematical precision to coincide with solar solstices and equinoxes. For example, during the spring equinox at Chichen Itza, the calculated interplay of sunlight and shadow creates the illusion of a serpentine deity descending the stone staircase of the main pyramid. This fusion of rigorous structural engineering and astronomical observation served a dual function: it validated the metaphysical authority of the ruling dynasty while providing an empirical agricultural calendar essential for agrarian survival.</p>`,
            questions: [
                { id: "v1", q: "The ancient Maya utilized wheeled vehicles and heavy iron tools to transport limestone blocks across long distances.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "B", note: "FALSE: Teks secara eksplisit menyatakan mereka membangun 'without the benefit of draft animals, wheeled transportation, or metallurgy'." },
                { id: "v2", q: "LiDAR technology proved that Maya urban centers were far more isolated from one another than previously assumed.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "B", note: "FALSE: Kebalikannya, survei LiDAR membuktikan kota-kota tersebut 'not isolated enclaves, but interconnected components' (tidak terisolasi, melainkan terhubung)." },
                { id: "v3", q: "The subterranean reservoirs known as chultunes were engineered to prevent water from leaking out into the soil.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "A", note: "TRUE: Sesuai informasi paragraf kedua, waduk dilapisi plester khusus 'to impede water seepage' (untuk menghalangi perembesan air)." },
                { id: "v4", q: "Maya rulers lost their political power during years when seasonal droughts were exceptionally long.", options: ["TRUE", "FALSE", "NOT GIVEN"], ans: "C", note: "NOT GIVEN: Teks menyebut kontrol air memperkuat kekuasaan mereka, tapi tidak membahas apakah mereka beneran kehilangan kekuasaan saat kekeringan panjang terjadi." }
            ]
        }
    };

    let activeQuestions = [];

    function setupQuiz() {
        // Ambil urutan hari otomatis (0 = Minggu, 1 = Senin, dst)
        const currentDay = new Date().getDay();
        let selectedBlock;

        if (currentDay === 1 || currentDay === 2) {
            selectedBlock = readingDatabase.paketSeninSelasa;
        } else if (currentDay === 3 || currentDay === 4) {
            selectedBlock = readingDatabase.paketRabuKamis;
        } else {
            selectedBlock = readingDatabase.paketJumatSabtuMinggu;
        }

        document.getElementById('schedule-info').innerHTML = `<i class="fa-solid fa-calendar-check"></i> ${selectedBlock.name}`;
        document.getElementById('passage-container').innerHTML = selectedBlock.passage;
        activeQuestions = selectedBlock.questions;
        renderQuestions();
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = "";
        activeQuestions.forEach((item, index) => {
            let optionsHTML = '';
            const labels = ['A', 'B', 'C'];
            item.options.forEach((opt, oIdx) => {
                optionsHTML += `
                    <label class="option-item" onclick="highlightOption(this, '${item.id}')">
                        <input type="radio" name="${item.id}" value="${labels[oIdx]}" required> 
                        ${labels[oIdx]}. ${opt}
                    </label>
                `;
            });
            container.innerHTML += `
                <div class="question-box">
                    <div class="question-title">${index + 1}. ${item.q}</div>
                    <div class="options-list">${optionsHTML}</div>
                </div>
            `;
        });
    }

    function highlightOption(element, groupName) {
        const options = element.parentElement.querySelectorAll('.option-item');
        options.forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
    }

    function evaluateQuiz(event) {
        event.preventDefault();
        const form = document.getElementById('dynamicQuizForm');
        let correct = 0;
        let reviewHTML = '<strong>Analisis Jawaban & Bedah Distractor Penguji:</strong><br><br>';

        activeQuestions.forEach((item, index) => {
            const userAns = form.elements[item.id].value;
            if (userAns === item.ans) correct++;
            reviewHTML += `<b>Soal ${index + 1}:</b> ${item.note}<br><br>`;
        });

        const resultArea = document.getElementById('result-area');
        document.getElementById('scoreTitle').innerText = `Skor Akhir Anda: Benar ${correct} dari ${activeQuestions.length} Pertanyaan`;
        
        let band = "";
        if (correct === activeQuestions.length) band = "Band 8.5 - 9.0 (Elite Academic Scholar - Analisis Sempurna)";
        else if (correct >= 2) band = "Band 6.5 - 7.5 (Target Skor Universitas Dunia Aman)";
        else band = "Band < 5.5 (Butuh Tambahan Fokus Teknik Scanning Detail)";

        document.getElementById('bandEstimate').innerText = `Estimasi Kompetensi: ${band}`;
        document.getElementById('explanationBox').innerHTML = reviewHTML;
        resultArea.style.display = 'block';
        resultArea.scrollIntoView({ behavior: 'smooth' });
    }

    window.onload = setupQuiz;
</script>
</body>
</html>
