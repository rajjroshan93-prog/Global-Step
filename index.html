<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to San Aethelgard Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=600;700&family=Lato:wght=400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #001f3f;
            --accent: #00D4FF;
            --bg-dark: #00152b;
            --card-bg: #ffffff;
            --text-main: #334155;
            --slate-gray: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animasi Latar Belakang */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, rgba(0,0,0,0) 70%);
            top: -50px;
            right: -50px;
            z-index: 1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -100px;
            left: -100px;
            z-index: 1;
        }

        .welcome-card {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 212, 255, 0.15);
            z-index: 10;
            transform: translateY(0);
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .academy-logo {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: var(--accent);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 25px auto;
            border: 2px solid var(--accent);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
        }

        .welcome-card h1 {
            font-family: 'Poppins', sans-serif;
            color: var(--primary);
            font-size: 30px;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .welcome-card p {
            font-size: 15px;
            color: var(--slate-gray);
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 16px;
            transition: 0.3s;
            border: 2px solid var(--primary);
            box-shadow: 0 4px 12px rgba(0, 31, 63, 0.2);
        }

        .main-btn:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #ffffff;
            color: #e1306c;
            padding: 14px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 14px;
            transition: 0.3s;
            border: 2px solid #e2e8f0;
        }

        .social-btn:hover {
            background: #fff5f7;
            border-color: #e1306c;
            box-shadow: 0 4px 12px rgba(225, 48, 108, 0.15);
        }

        .footer-credit {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 700;
            text-align: center;
            margin-top: 40px;
            z-index: 10;
        }

        .footer-credit a {
            color: var(--accent);
            text-decoration: none;
            transition: 0.2s;
        }

        .footer-credit a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .welcome-card {
                padding: 40px 25px;
            }
            .welcome-card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="welcome-card">
    <div class="academy-logo">
        <i class="fa-solid fa-graduation-cap"></i>
    </div>
    <h1>San Aethelgard<br>Academy</h1>
    <p>Sistem Simulasi dan Akselerasi Persiapan Ujian Bahasa Inggris Internasional Berstandar Tinggi.</p>

    <div class="btn-group">
        <a href="dashboard.html" class="main-btn">
            <i class="fa-solid fa-right-to-bracket"></i> ENTER DASHBOARD
        </a>
        
        <a href="https://www.instagram.com/sanaethelgard?igsh=N29hZWphOTdmbzZy" target="_blank" class="social-btn">
            <i class="fa-brands fa-instagram"></i> Official Instagram
        </a>
    </div>
</div>

<div class="footer-credit">
    Created by San | <a href="https://www.instagram.com/sanaethelgard?igsh=N29hZWphOTdmbzZy" target="_blank"><i class="fa-brands fa-instagram"></i> @sanaethelgard</a>
</div>

</body>
</html>
