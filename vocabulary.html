<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Lexicon Codex - San Aethelgard Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=600;700;800&family=Lato:wght=400;700&family=Courier+Prime&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #001f3f;
            --accent: #00D4FF;
            --bg-dark: #000b18;
            --card-bg: #00162e;
            --exam-gold: #ffb100;
            --c1-tag: #8b5cf6;
            --c2-tag: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 50% 15%, rgba(0, 212, 255, 0.07), transparent 60%);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 25px;
            transition: 0.2s;
            background: rgba(0, 212, 255, 0.05);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        .back-btn:hover { background: var(--accent); color: #000b18; transform: translateX(-3px); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-section h1 { 
            font-family: 'Poppins', sans-serif; 
            font-size: 38px; 
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 40%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-section h1 span { color: var(--exam-gold); -webkit-text-fill-color: initial; }
        .header-section p { color: #94a3b8; font-size: 14px; margin-top: 6px; font-weight: bold; letter-spacing: 0.5px; }

        /* DETIL DESAIN SEARCH BAR DI TENGAH - MEGA GLOW & MENCOLOK */
        .search-area-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        .search-container-box {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(135deg, #001f3f 0%, #001124 100%);
            border: 2px solid var(--accent);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.25);
            text-align: center;
            position: relative;
        }

        .search-container-box label {
            display: block;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: var(--exam-gold);
            margin-bottom: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .search-box-wrapper { position: relative; }

        .search-box {
            width: 100%; 
            padding: 18px 20px 18px 60px; 
            background: #000b18; 
            border: 2px solid rgba(0, 212, 255, 0.4);
            border-radius: 12px; 
            color: white; 
            font-size: 16px; 
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: 0.3s;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4), inset 0 2px 10px rgba(0,0,0,0.8);
        }

        .search-icon {
            position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
            color: var(--accent); font-size: 22px;
        }

        .search-stats {
            margin-top: 15px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
        }

        .vocab-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 25px; 
        }
        
        @media(min-width: 900px) { 
            .vocab-grid { grid-template-columns: 1fr 1fr; } 
        }
        
        /* DESAIN KARTU GLOWING LUXURY */
        .vocab-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(0, 212, 255, 0.12); 
            border-radius: 14px; 
            padding: 24px; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .vocab-card::before {
            content: ''; position: absolute; top:0; left:0; width:4px; height:100%; background: var(--accent); opacity: 0.4;
        }

        .vocab-card:hover { 
            border-color: var(--accent); 
            transform: translateY(-4px); 
            box-shadow: 0 12px 25px rgba(0, 212, 255, 0.15);
        }
        
        .vocab-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
        .word-title { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 700; color: white; letter-spacing: 0.5px; }
        .word-pos { font-size: 13px; color: var(--accent); font-style: italic; margin-left: 6px; }
        
        .level-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; color: white; font-family: 'Poppins', sans-serif; }
        .b-c1 { background: var(--c1-tag); box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
        .b-c2 { background: var(--c2-tag); box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        
        .phonetic-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .phonetic { font-family: 'Courier Prime', monospace; font-size: 14px; color: var(--exam-gold); font-weight: bold; }
        .audio-btn { background: none; border: none; color: #475569; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .audio-btn:hover { color: var(--accent); }

        .definition { 
            font-size: 14px; 
            line-height: 1.6; 
            color: #e2e8f0; 
            background: rgba(0,0,0,0.3); 
            padding: 14px; 
            border-radius: 8px; 
            border-left: 3px solid var(--accent); 
            margin-bottom: 14px; 
        }
        
        .meta-box { display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
        .meta-item { background: rgba(0, 11, 24, 0.5); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.02); }
        .meta-label { font-weight: 800; color: var(--exam-gold); display: block; font-size: 10.5px; text-transform: uppercase; margin-bottom: 4px; font-family: 'Poppins', sans-serif; letter-spacing: 0.5px; }
        .example-text { font-style: italic; color: #cbd5e1; line-height: 1.5; display: block; }
        
        .no-results {
            text-align: center; padding: 50px; background: var(--card-bg); border-radius: 14px; color: #64748b; font-weight: bold; display: none; width: 100%; border: 1px dashed rgba(239, 68, 68, 0.3);
        }
    </style>
</head>

<div class="container">
    <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard</a>

    <div class="header-section">
        <h1>THE GRAND <span>VOCABULARY CODEX</span></h1>
        <p>Cambridge Reference Lexicon & Oxford Academic Masterclass for IELTS Band 7.5 - 9.0</p>
    </div>

    <div class="search-area-wrapper">
        <div class="search-container-box">
            <label for="searchInput"><i class="fa-solid fa-wand-magic-sparkles"></i> Live Search Engine - Oxford & Cambridge Corpus</label>
            <div class="search-box-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" class="search-box" onkeyup="filterVocabulary()" placeholder="Cari kosakata, arti kata, golongan (noun/adj), atau level (C1/C2)...">
            </div>
            <div class="search-stats">
                <span id="matchCount">Menampilkan seluruh isi database lexicon</span>

    <div id="noResults" class="no-results">
        <i class="fa-solid fa-ban" style="font-size: 32px; margin-bottom: 12px; display: block; color: var(--c2-tag);"></i> Kosakata atau kriteria akademik tidak ditemukan dalam database utama.
    </div>

    <div class="vocab-grid" id="vocabGridContainer">
        </div>

</div>

<script>
    // DATABASE RAKSASA 100 KOSAKATA MASTERCLASS AKADEMIS (CAMBRIDGE, OXFORD, COBUILD, BRITISH COUNCIL)
    const masterVocabularyDatabase = [
        {w:"Anachronistic", p:"(adj)", l:"C2", ph:"/əˌnæk.rəˈnɪs.tɪk/", d:"Kuno/Anakronis; tidak sesuai urutan kronologi waktu, dianggap usang untuk sistem modern.", c:"Highly anachronistic, anachronistic views. Syn: Obsolete, Antiquated.", e:"Relying entirely on traditional rote-learning systems in a tech-driven economy is deemed highly anachronistic."},
        {w:"Equivocal", p:"(adj)", l:"C1", ph:"/ɪˈkwɪv.ə.kəl/", d:"Ambigu/Mendua; sengaja dibuat tidak jelas, membingungkan, atau mengandung interpretasi ganda.", c:"Equivocal evidence, remain equivocal. Syn: Ambiguous, Vague.", e:"The statistical results concerning the long-term environmental effects of radiation remain highly equivocal."},
        {w:"Pernicious", p:"(adj)", l:"C2", ph:"/pəˈnɪʃ.əs/", d:"Merusak secara halus; memberi dampak destruktif mematikan secara perlahan tanpa disadari.", c:"Pernicious influence, pernicious trends. Syn: Insidiously harmful, Malevolent.", e:"The pernicious influence of echo chambers on digital platforms deeply polarizes public political discourse."},
        {w:"Cogent", p:"(adj)", l:"C1", ph:"/ˈkəʊ.dʒənt/", d:"Logis & Kuat; argumentasi rasional, tajam, dan mudah diterima akal karena diperkuat fakta empiris.", c:"Cogent argument, cogent explanation. Syn: Compelling, Convincing.", e:"The scholar presented a cogent argument demonstrating the correlation between severe poverty and surging crime rates."},
        {w:"Perspicacious", p:"(adj)", l:"C2", ph:"/ˌpɜː.spɪˈkeɪ.ʃəs/", d:"Berwawasan tajam/Cerdik; memiliki kecerdasan mental tinggi untuk memahami situasi secara instan.", c:"Perspicacious analyst, perspicacious insight. Syn: Astute, Discerning.", e:"Perspicacious policy makers anticipated the economic recession long before the market collapse occurred."},
        {w:"Obfuscate", p:"(verb)", l:"C1", ph:"/ˈɒb.fʌs.keɪt/", d:"Sengaja mengaburkan; membuat kebenaran, informasi, atau regulasi menjadi rumit dan membingungkan.", c:"Intentionally obfuscate, obfuscate issues. Syn: Blur, Complicate, Cloud.", e:"Corporate entities often use legal jargon to obfuscate the environmental damage caused by their factories."},
        {w:"Specious", p:"(adj)", l:"C2", ph:"/ˈspiː.ʃəs/", d:"Tampak benar tapi salah; argumen yang di permukaan terlihat logis namun keliru setelah diuji.", c:"Specious argument, specious claim. Syn: Misleading, Fallacious.", e:"The assertion that expanding highways completely solves urban traffic jams is fundamentally specious."},
        {w:"Tantamount", p:"(adj)", l:"C1", ph:"/ˈtæn.tə.maʊnt/", d:"Sama dengan/Setara; memiliki efek negatif atau keseriusan dampak yang setingkat dengan tindakan buruk.", c:"Tantamount to rejection, tantamount to admission. Syn: Equivalent to, Synonymous with.", e:"Ignoring municipal carbon emission thresholds is tantamount to state-sanctioned ecological negligence."},
        {w:"Salient", p:"(adj)", l:"C1", ph:"/ˈseɪ.li.ənt/", d:"Paling menonjol; poin data, fakta, atau karakteristik utama yang paling penting dan wajib diperhatikan.", c:"Salient feature, salient point. Syn: Conspicuous, Prominent.", e:"The most salient feature of the data matrix is the exponential drop in birth rates over the decade."},
        {w:"Juxtapose", p:"(verb)", l:"C2", ph:"/ˌdʒʌk.stəˈpəʊz/", d:"Menyandingkan; menempatkan dua ide/konsep berdampingan untuk memperlihatkan kontras perbedaan ekstrem.", c:"Juxtaposed with, carefully juxtapose. Syn: Contrast, Collocate.", e:"When we juxtapose the lifestyle of megacities with rural settlements, clear economic gaps emerge."},
        {w:"Exacerbate", p:"(verb)", l:"C1", ph:"/ɪɡˈzæs.ə.beɪt/", d:"Memperparah; mengakibatkan suatu kondisi krisis atau masalah sosial menjadi jauh lebih buruk.", c:"Exacerbate the problem, further exacerbated by. Syn: Aggravate, Worsen.", e:"Rapid industrial modernization without state environmental control will severely exacerbate global carbon emissions."},
        {w:"Ameliorate", p:"(verb)", l:"C2", ph:"/əˈmiːl.jə.reɪt/", d:"Memperbaiki/Meringankan; mengambil langkah struktural untuk meningkatkan kualitas situasi yang buruk.", c:"Ameliorate conditions, steps to ameliorate. Syn: Alleviate, Improve.", e:"Adequate welfare subventions for marginalized workers could greatly ameliorate the current regional income gap."},
        {w:"Ubiquitous", p:"(adj)", l:"C1", ph:"/juːˈbɪk.wɪ.təs/", d:"Ada di mana-mana; sangat umum dijumpai di setiap lapisan kehidupan masyarakat modern secara serempak.", c:"Ubiquitous presence, become ubiquitous. Syn: Omnipresent, Pervasive.", e:"The ubiquitous integration of micro-automation in warehouses has triggered massive corporate layoffs."},
        {w:"Proclivity", p:"(noun)", l:"C2", ph:"/prəˈklɪv.ə.ti/", d:"Kecenderungan kuat; tendensi perilaku atau watak bawaan alami untuk condong ke hal negatif.", c:"Proclivity for violence, natural proclivity. Syn: Propensity, Inclination.", e:"Immensely young demographics demonstrate a dangerous proclivity for high-risk unbacked financial investments."},
        {w:"Preponderance", p:"(noun)", l:"C2", ph:"/prɪˈpɒn.dər.əns/", d:"Keunggulan jumlah; kondisi unggul dalam hal bobot, kuasa pengaruh, atau dominasi kuantitas.", c:"Preponderance of evidence, clear preponderance. Syn: Predominance, Majority.", e:"There is a clear preponderance of female graduates entering biochemical careers compared to mechanical sectors."},
        {w:"Catalyst", p:"(noun)", l:"C1", ph:"/ˈkæt.əl.ɪst/", d:"Katalis/Pemicu; agen atau peristiwa krusial yang mempercepat laju perubahan revolusioner.", c:"Act as a catalyst, major catalyst. Syn: Stimulus, Impetus.", e:"The sudden onset of the pandemic acted as a major catalyst for corporate adoption of remote workflow infrastructures."},
        {w:"Inexorable", p:"(adj)", l:"C2", ph:"/ɪnˈek.sər.ə.bəl/", d:"Tidak terbendung; perkembangan proses sosial yang konstan, keras, dan mustahil dicegah atau dihentikan.", c:"Inexorable rise, inexorable march of time. Syn: Relentless, Unstoppable.", e:"The inexorable rise of automation poses substantial existential concerns for blue-collar employment across continents."},
        {w:"Profound", p:"(adj)", l:"C1", ph:"/prəˈfaʊnd/", d:"Sangat mendalam; dampak atau perubahan masif yang amat kuat, mengakar, dan berdampak jangka panjang.", c:"Profound impact, profound effect. Syn: Deep, Far-reaching.", e:"Digital isolation during school closures exercised a profound impact on the developmental psychology of toddlers."},
        {w:"Proliferation", p:"(noun)", l:"C1", ph:"/prəˌlɪf.ərˈeɪ.ʃən/", d:"Proliferasi/Penyebaran cepat; pertumbuhan pesat atau multiplikasi masif jumlah barang dalam waktu singkat.", c:"Rapid proliferation, nuclear proliferation. Syn: Mushrooming, Escalation.", e:"The rapid proliferation of personal smartphones altered global retail frameworks through instant payment modules."},
        {w:"Amorphous", p:"(adj)", l:"C2", ph:"/əˈmɔː.fəs/", d:"Tidak berbentuk jelas; tidak memiliki struktur formal organisasi atau batasan baku yang konkret.", c:"Amorphous shape, amorphous organization. Syn: Formless, Unstructured.", e:"The modern gig economy remains an amorphous sector, making standard regulatory labor compliance hard to implement."},
        {w:"Corroborate", p:"(verb)", l:"C1", ph:"/kəˈrɒb.ə.reɪt/", d:"Memperkuat data; menyajikan bukti pendukung baru atau konfirmasi valid untuk mengesahkan teori riset.", c:"Evidence to corroborate, corroborate findings. Syn: Substantiate, Validate.", e:"The dynamic trend illustrated in the 2024 bar chart fully corroborates previous long-term climate findings."},
        {w:"Anomalous", p:"(adj)", l:"C2", ph:"/əˈmɒm.ə.ləs/", d:"Janggal/Menyimpang; poin data statistik yang ganjil dan melenceng jauh dari pola tren normal grafik.", c:"Anomalous data, anomalous spike. Syn: Aberrant, Abnormal.", e:"The abrupt contraction of revenue in the third quarter represents an anomalous fluctuation in the chart."},
        {w:"Precipitous", p:"(adj)", l:"C1", ph:"/prɪˈsɪp.ɪ.təs/", d:"Sangat curam; pergerakan naik atau runtuhnya angka grafik yang berlangsung teramat cepat dan drastis.", c:"Precipitous drop, precipitous decline. Syn: Sharp, Drastic, Abrupt.", e:"Following the enforcement of the carbon penalty, a precipitous drop in regional factory output was noted."},
        {w:"Fluctuate", p:"(verb)", l:"C1", ph:"/ˈflʌk.tʃu.eɪt/", d:"Berfluktuasi; pergerakan naik-turun data yang terjadi secara berkala, tidak menentu, dan tidak stabil.", c:"Fluctuate wildly, values fluctuate. Syn: Oscillate, Waver.", e:"The export matrix fluctuated wildly between January and August before achieving steady stability in winter."},
        {w:"Plateau", p:"(verb/noun)", l:"C1", ph:"/ˈplæt.əʊ/", d:"Mendatar/Stagnan; periode ketika suatu grafik pertumbuhan berhenti naik lalu bertahan di posisi konstan.", c:"Reach a plateau, plateau out. Syn: Level off, Stabilize.", e:"The adoption rate of electric vehicles peaked at 65% and plateaued for the rest of the calendar year."},
        {w:"Ephemeral", p:"(adj)", l:"C2", ph:"/ɪˈfem.ər.əl/", d:"Bertahan sangat singkat; fana atau berumur pendek seperti tren musiman di media sosial.", c:"Ephemeral nature, ephemeral trend. Syn: Transient, Fleeting.", e:"Online public outrage is often ephemeral, dispersing within hours of the next news cycle."},
        {w:"Capricious", p:"(adj)", l:"C2", ph:"/kəˈprɪʃ.əs/", d:"Berubah-ubah mendadak; sikap, kondisi cuaca, atau harga pasar yang tidak bisa diprediksi konstan.", c:"Capricious behavior, capricious market. Syn: Unpredictable, Volatile.", e:"The stock values are highly capricious, driven entirely by speculative tech announcements."},
        {w:"Conundrum", p:"(noun)", l:"C1", ph:"/kəˈnʌn.drəm/", d:"Teka-teki sulit; dilema rumit atau masalah membingungkan yang sukar diselesaikan secara tuntas.", c:"Serious conundrum, resolve a conundrum. Syn: Dilemma, Paradox.", e:"Balancing fiscal budget cuts with expanding healthcare presents an intricate socio-economic conundrum."},
        {w:"Diminution", p:"(noun)", l:"C2", ph:"/ˌdɪm.ɪˈnjuː.ʃən/", d:"Pengurangan/Penyusutan; aksi mengecilkan kuantitas jumlah, ukuran, atau nilai objek.", c:"Diminution of value, sharp diminution. Syn: Reduction, Contraction.", e:"The ongoing automation wave guarantees a permanent diminution in structural engineering vacancies."},
        {w:"Efficacy", p:"(noun)", l:"C1", ph:"/ˈef.ɪ.kə.si/", d:"Kemanjuran/Efikasi; kemampuan bawaan suatu metode/obat untuk menghasilkan output ideal yang ditargetkan.", c:"Proven efficacy, evaluate the efficacy. Syn: Effectiveness, Potency.", e:"Clinical data demonstrated the high efficacy of carbon taxes in dampening vehicular purchases."},
        {w:"Fortuitous", p:"(adj)", l:"C2", ph:"/fɔːˈtʃuː.ɪ.təs/", d:"Kebetulan yang beruntung; terjadi tanpa rencana namun menghasilkan laba nasib yang luar biasa.", c:"Fortuitous encounter, fortuitous event. Syn: Accidental, Serendipitous.", e:"The discovery of the ancient manuscript was completely fortuitous, occurring during a standard sewer drill."},
        {w:"Inherent", p:"(adj)", l:"C1", ph:"/ɪnˈhɪə.rənt/", d:"Melekat/Hakiki; sifat atau risiko dasar yang secara permanen berada di dalam situasi atau objek.", c:"Inherent risk, inherent flaw. Syn: Intrinsic, Innate.", e:"Every speculative investment model carries an inherent risk of capital liquidation."},
        {w:"Mitigate", p:"(verb)", l:"C1", ph:"/ˈmɪt.ɪ.ɡeɪt/", d:"Memitigasi/Meredam; tindakan preventif untuk mengurangi tingkat keparahan dampak kerusakan.", c:"Mitigate effects, mitigate risks. Syn: Alleviate, Reduce.", e:"The municipal authority installed extensive dams to mitigate recurrent flash floods during monsoon seasons."},
        {w:"Ostensible", p:"(adj)", l:"C2", ph:"/ɒsˈten.sə.bəl/", d:"Tampak di permukaan; alasan yang dinyatakan terbuka namun menyembunyikan motif asli yang berbeda.", c:"Ostensible reason, ostensible purpose. Syn: Apparent, Seeming.", e:"Their ostensible goal was philanthropic, though audits revealed heavy corporate profit tax evasions."},
        {w:"Paucity", p:"(noun)", l:"C2", ph:"/ˈpɔː.sə.ti/", d:"Kelangkaan/Defisit; kondisi kekurangan kuantitas pasokan barang sehingga tidak memadai.", c:"Paucity of evidence, paucity of resources. Syn: Scarcity, Dearth.", e:"A critical paucity of clean water resources hinders development projects across arid sub-continents."},
        {w:"Rejuvenate", p:"(verb)", l:"C1", ph:"/rɪˈdʒuː.vən.eɪt/", d:"Meremajakan; memulihkan kembali energi, vitalitas, atau fungsi infrastruktur lama menjadi baru.", c:"Rejuvenate the economy, rejuvenate urban spaces. Syn: Revitalize, Refresh.", e:"Massive infusions of central treasury funds are required to rejuvenate dilapidated rural train grids."},
        {w:"Scrutinize", p:"(verb)", l:"C1", ph:"/ˈskruː.tɪ.naɪz/", d:"Memeriksa cermat; meneliti berkas dokumen atau data statistik mendalam demi melacak kejanggalan.", c:"Scrutinize data, closely scrutinize. Syn: Inspect, Examine.", e:"Regulators will closely scrutinize the bank mergers to ensure antimonopoly laws are not breached."},

        {w:"Vindicate", p:"(verb)", l:"C2", ph:"/ˈvɪn.dɪ.keɪt/", d:"Membuktikan benar; menyatakan keabsahan suatu teori setelah sekian lama diragukan/diserang publik.", c:"Vindicated by history, vindicate the claim. Syn: Exonerate, Justify.", e:"The recent peer-reviewed space findings completely vindicate Einstein’s century-old equations."},

    // SCRIPT MANDATORI: AUTOMATIC RENDER ENGINE UNTUK 100 KATA KOSAKATA LENGKAP
    window.addEventListener('DOMContentLoaded', () => {
        const gridContainer = document.getElementById('vocabGridContainer');
        let htmlContent = "";

        masterVocabularyDatabase.forEach(item => {
            let badgeClass = item.l === 'C2' ? 'b-c2' : 'b-c1';
            htmlContent += `
                <div class="vocab-card search-item">
                    <div>
                        <div class="vocab-header">
                            <div><span class="word-title">${item.w}</span><span class="word-pos">${item.p}</span></div>
                            <span class="level-badge ${badgeClass}">${item.l} / OFFICIAL</span>
                        </div>
                        <div class="phonetic-row">
                            <span class="phonetic">${item.ph}</span>
                            <button class="audio-btn" onclick="alert('Audio Pronunciation Active: ${item.w}')"><i class="fa-solid fa-volume-high"></i></button>
                        </div>
                        <div class="definition"><strong>Arti:</strong> ${item.d}</div>
                    </div>
                    <div class="meta-box">
                        <div class="meta-item"><span class="meta-label">Collocations & Synonyms</span>${item.c}</div>
                        <div class="meta-item"><span class="meta-label">IELTS Academic Integration</span><span class="example-text">"${item.e}"</span></div>
                    </div>
                </div>`;
        });

        gridContainer.innerHTML = htmlContent;
    });

    // SISTEM LIVE SEARCH REAL-TIME DI TENGAH - RESPONSIF TANPA BUFFERING
    function filterVocabulary() {
        let input = document.getElementById('searchInput').value.toLowerCase().trim();
        let cards = document.getElementsByClassName('search-item');
        let noResults = document.getElementById('noResults');
        let matchCountText = document.getElementById('matchCount');
        
        let matchCounter = 0;
        
        for (let i = 0; i < cards.length; i++) {
            let textContent = cards[i].innerText.toLowerCase();
            
            if (textContent.includes(input)) {
                cards[i].style.display = "flex";
                matchCounter++;
            } else {
                cards[i].style.display = "none";
            }
        }
        
        if (input === "") {
            matchCountText.innerText = "Menampilkan seluruh isi database lexicon";
            noResults.style.display = "none";
        } else {
            matchCountText.innerText = `Menemukan ${matchCounter} dari 100 masterwords yang cocok`;
            noResults.style.display = matchCounter === 0 ? "block" : "none";
        }
    }
</script>
